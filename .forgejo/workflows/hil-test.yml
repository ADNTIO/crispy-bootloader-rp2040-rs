name: HIL test — protocole bootloader sur cible rp2040
# Forgejo-only (GitHub ignore .forgejo/). Réserve du matériel réel → manuel.
# Principe : build l'ELF sur le runner, copie sur la RP, flash via sonde SWD
# (probe-rs) puis exécute les tests protocole. Aucune toolchain sur la RP.
on: [workflow_dispatch]

jobs:
  hil-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # --- Build firmware sur le runner (x86, rapide) ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
          components: llvm-tools-preview

      - name: Build bootloader + firmware (ELF + firmware.bin)
        env:
          # Le runner casse sur "HTTP2 framing layer" en téléchargeant depuis
          # crates.io ; HTTP/1.1 (pas de multiplexing) + retries = robuste.
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"
        run: |
          cargo install cargo-binutils flip-link --locked   # rust-objcopy + linker embarqué
          cargo build --release --target thumbv6m-none-eabi \
            -p crispy-bootloader -p crispy-fw-sample-rs
          rust-objcopy -O binary \
            target/thumbv6m-none-eabi/release/crispy-fw-sample-rs \
            target/firmware.bin

      # --- Réservation d'une RP du banc ---
      - id: rp
        uses: ./.forgejo/actions/hil-provision
        with:
          client-id: ${{ secrets.HIL_OIDC_CLIENT_ID }}
          client-secret: ${{ secrets.HIL_OIDC_CLIENT_SECRET }}

      # --- Copie sources (tests) + artefacts buildés sur la RP ---
      - name: Copier le dépôt et le firmware sur la RP
        run: |
          git archive --format=tar HEAD \
            | ssh hil-rp 'rm -rf ~/crispy && mkdir -p ~/crispy && tar -x -C ~/crispy'
          ssh hil-rp 'mkdir -p ~/crispy/target/thumbv6m-none-eabi/release'
          scp target/thumbv6m-none-eabi/release/crispy-bootloader \
              hil-rp:~/crispy/target/thumbv6m-none-eabi/release/crispy-bootloader
          scp target/firmware.bin hil-rp:~/crispy/target/firmware.bin

      # --- probe-rs + uv (légers), flash + tests protocole, en root sur la RP ---
      - name: Flash + tests protocole sur la cible
        run: |
          ssh hil-rp 'sudo -n bash -s' <<'EOF'
          set -euxo pipefail
          export HOME=/root PATH=/root/.cargo/bin:/usr/local/bin:$PATH
          REPO=/home/hil/crispy

          echo "::group::préflight — accès sortant"
          for url in https://astral.sh https://github.com; do
            curl -fsS --max-time 20 -o /dev/null "$url" && echo "OK $url" \
              || { echo "::error::pas d'accès sortant vers $url"; exit 1; }
          done
          echo "::endgroup::"

          echo "::group::probe-rs + uv"
          command -v uv >/dev/null || \
            curl -LsSf https://astral.sh/uv/install.sh \
              | env UV_INSTALL_DIR=/usr/local/bin INSTALLER_NO_MODIFY_PATH=1 sh
          command -v probe-rs >/dev/null || \
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/probe-rs/probe-rs/releases/latest/download/probe-rs-tools-installer.sh | sh
          uv --version
          probe-rs --version
          echo "Sondes :"; probe-rs list
          echo "::endgroup::"

          echo "::group::tests protocole (build sauté, flash via SWD)"
          cd "$REPO/tests/integration"
          CRISPY_SKIP_BUILD=1 uv run pytest boot/bootsequence -v --tb=short
          echo "::endgroup::"
          EOF

      - name: Libérer la RP
        if: always()
        run: |
          jwt=$(curl -fsS -X POST https://authentik.k8s.adnt.io/application/o/token/ \
            -d grant_type=client_credentials \
            -d client_id="${{ secrets.HIL_OIDC_CLIENT_ID }}" \
            -d client_secret="${{ secrets.HIL_OIDC_CLIENT_SECRET }}" \
            -d scope=openid | grep -o '"access_token": *"[^"]*"' | sed 's/.*: *"\(.*\)"$/\1/')
          curl -fsS -X DELETE -H "Authorization: Bearer $jwt" \
            "https://hil.k8s.adnt.io/api/lease/${{ steps.rp.outputs.lease-id }}"
