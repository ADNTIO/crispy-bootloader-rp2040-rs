name: HIL smoke — découverte du banc (RP + rp2040)
# Forgejo-only (GitHub ignore .forgejo/). Déclenchement manuel : on réserve
# du matériel réel, donc pas d'exécution automatique sur push.
on: [workflow_dispatch]

jobs:
  discover:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - id: rp
        uses: ./.forgejo/actions/hil-provision   # réserve une RP, configure ssh hil-rp
        with:
          client-id: ${{ secrets.HIL_OIDC_CLIENT_ID }}
          client-secret: ${{ secrets.HIL_OIDC_CLIENT_SECRET }}

      - name: Découverte de la cible et de l'outillage sur la RP
        run: |
          ssh hil-rp 'bash -s' <<'EOF'
          set +e
          line() { printf '\n=== %s ===\n' "$1"; }

          line "Hôte"
          hostname; uname -a; head -1 /etc/os-release; id

          line "rp2040 sur USB (VID 2e8a : bootloader 000a / fw 000b)"
          lsusb 2>/dev/null | grep -i '2e8a' || echo "⚠️  aucun périphérique 2e8a vu par lsusb"
          ls -l /dev/ttyACM* 2>/dev/null || echo "⚠️  pas de /dev/ttyACM*"

          line "Sonde SWD (probe-rs)"
          if command -v probe-rs >/dev/null; then
            probe-rs --version
            probe-rs list || echo "⚠️  probe-rs ne liste aucune sonde"
          else
            echo "⚠️  probe-rs absent"
          fi

          line "Bascule BOOTSEL / montage (RPI-RP2)"
          command -v lsblk     >/dev/null && lsblk -o NAME,LABEL,MOUNTPOINT || echo "⚠️  lsblk absent"
          command -v udisksctl >/dev/null && echo "udisksctl: OK"            || echo "⚠️  udisksctl absent"

          line "Python / uv (exécution des tests)"
          command -v uv      >/dev/null && uv --version       || echo "⚠️  uv absent"
          command -v python3 >/dev/null && python3 --version  || echo "⚠️  python3 absent"

          line "Rust / cargo (au cas où build sur cible)"
          command -v cargo >/dev/null && cargo --version || echo "ℹ️  cargo absent (build prévu côté runner)"

          line "Accès série (groupe dialout)"
          groups
          EOF

      - name: Libérer la RP
        if: always()
        run: |
          jwt=$(curl -fsS -X POST https://authentik.k8s.adnt.io/application/o/token/ \
            -d grant_type=client_credentials \
            -d client_id="${{ secrets.HIL_OIDC_CLIENT_ID }}" \
            -d client_secret="${{ secrets.HIL_OIDC_CLIENT_SECRET }}" \
            -d scope=openid | grep -o '"access_token": *"[^"]*"' | sed 's/.*: *"\(.*\)"$/\1/')
          curl -fsS -X DELETE -H "Authorization: Bearer $jwt" \
            "https://hil.k8s.adnt.io/api/lease/${{ steps.rp.outputs.lease-id }}"
