name: HIL smoke — bench discovery (RP + rp2040)
# Forgejo-only (GitHub ignores .forgejo/). Manual trigger: it reserves real
# hardware, so no automatic run on push.
on: [workflow_dispatch]

jobs:
  discover:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - id: rp
        uses: ./.forgejo/actions/hil-provision   # reserve an RP, set up ssh hil-rp
        with:
          client-id: ${{ secrets.HIL_OIDC_CLIENT_ID }}
          client-secret: ${{ secrets.HIL_OIDC_CLIENT_SECRET }}

      - name: Discover the target and tooling on the RP
        run: |
          ssh hil-rp 'bash -s' <<'EOF'
          set +e
          line() { printf '\n=== %s ===\n' "$1"; }

          line "Host"
          hostname; uname -a; head -1 /etc/os-release; id

          line "rp2040 on USB (VID 2e8a: bootloader 000a / fw 000b)"
          lsusb 2>/dev/null | grep -i '2e8a' || echo "⚠️  no 2e8a device seen by lsusb"
          ls -l /dev/ttyACM* 2>/dev/null || echo "⚠️  no /dev/ttyACM*"

          line "SWD probe (probe-rs)"
          if command -v probe-rs >/dev/null; then
            probe-rs --version
            probe-rs list || echo "⚠️  probe-rs lists no probe"
          else
            echo "⚠️  probe-rs missing"
          fi

          line "BOOTSEL / mount (RPI-RP2)"
          command -v lsblk     >/dev/null && lsblk -o NAME,LABEL,MOUNTPOINT || echo "⚠️  lsblk missing"
          command -v udisksctl >/dev/null && echo "udisksctl: OK"            || echo "⚠️  udisksctl missing"

          line "Python / uv (test runner)"
          command -v uv      >/dev/null && uv --version       || echo "⚠️  uv missing"
          command -v python3 >/dev/null && python3 --version  || echo "⚠️  python3 missing"

          line "Rust / cargo (in case of on-target build)"
          command -v cargo >/dev/null && cargo --version || echo "ℹ️  cargo missing (build expected on the runner)"

          line "Serial access (dialout group)"
          groups
          EOF

      - name: Release the RP
        if: always()
        run: |
          jwt=$(curl -fsS -X POST https://authentik.k8s.adnt.io/application/o/token/ \
            -d grant_type=client_credentials \
            -d client_id="${{ secrets.HIL_OIDC_CLIENT_ID }}" \
            -d client_secret="${{ secrets.HIL_OIDC_CLIENT_SECRET }}" \
            -d scope=openid | grep -o '"access_token": *"[^"]*"' | sed 's/.*: *"\(.*\)"$/\1/')
          curl -fsS -X DELETE -H "Authorization: Bearer $jwt" \
            "https://hil.k8s.adnt.io/api/lease/${{ steps.rp.outputs.lease-id }}"
