name: "HIL provision"
description: "Reserve an RP from the HIL bench (PoE power-cycle + boot) and set up SSH access (alias hil-rp). Waits and retries if the bench has no free RP."
inputs:
  authentik-url:
    description: "Authentik base URL (for the client_credentials JWT)"
    default: "https://authentik.k8s.adnt.io"
  api-url:
    description: "HIL controller API URL"
    default: "https://hil.k8s.adnt.io/api"
  client-id:
    description: "OIDC client_id (Actions secret HIL_OIDC_CLIENT_ID)"
    required: true
  client-secret:
    description: "OIDC client_secret (Actions secret HIL_OIDC_CLIENT_SECRET)"
    required: true
  max-wait-seconds:
    description: "Max time to keep waiting for a free RP when the bench is busy (same-repo queueing is handled by the workflow concurrency group; this is the safety net for external contention)"
    default: "600"
  retry-interval:
    description: "Seconds between lease attempts while the bench is busy"
    default: "30"
  target-pi:
    description: "Reserve a specific bench RP by pi_id or IP (the rp2040 target is wired to one RP only). Empty = any free RP. A lease that does not match is released and retried."
    default: ""
outputs:
  ip:
    description: "IP of the provisioned RP"
    value: ${{ steps.lease.outputs.ip }}
  lease-id:
    description: "Lease ID (pass it back when releasing)"
    value: ${{ steps.lease.outputs.lease-id }}
runs:
  using: composite
  steps:
    - id: lease
      shell: bash
      run: |
        set -euo pipefail
        # 1) M2M JWT via client_credentials (Authentik issues the token).
        jwt=$(curl -fsS -X POST "${{ inputs.authentik-url }}/application/o/token/" \
          -d grant_type=client_credentials \
          -d client_id="${{ inputs.client-id }}" \
          -d client_secret="${{ inputs.client-secret }}" \
          -d scope=openid \
          | grep -o '"access_token": *"[^"]*"' | sed 's/.*: *"\(.*\)"$/\1/')
        [ -n "$jwt" ] || { echo "::error::no JWT (client_credentials)"; exit 1; }

        # Extract a JSON string field from a body: jget "<body>" "<key>"
        jget() { printf '%s' "$1" | grep -o "\"$2\": *\"[^\"]*\"" | head -1 | sed 's/.*: *"\(.*\)"$/\1/' || true; }

        # 2) Reserve an RP. If the bench has no free RP yet, wait and retry
        #    (the controller said nothing is available) instead of failing.
        #    The rp2040 target is wired to a single RP, so when `target-pi` is
        #    set we send it as a hint AND verify the answer: a non-matching
        #    lease is released and we keep waiting for the wanted RP.
        target="${{ inputs.target-pi }}"
        url="${{ inputs.api-url }}/lease"
        [ -n "$target" ] && url="${url}?pi_id=${target}"
        deadline=$(( $(date +%s) + ${{ inputs.max-wait-seconds }} ))
        attempt=0
        while :; do
          attempt=$((attempt + 1))
          echo "🔧 Requesting an RP lease (attempt $attempt)…${target:+ (target $target)}"
          resp=$(curl -sS --max-time 230 -w $'\n%{http_code}' -X POST \
            -H "Authorization: Bearer $jwt" "$url" 2>/dev/null || true)
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          ip=$(jget "$body" ip); lid=$(jget "$body" lease_id); pid=$(jget "$body" pi_id)
          if { [ "$code" = "200" ] || [ "$code" = "201" ]; } && [ -n "$ip" ] && [ -n "$lid" ]; then
            # Got a lease. With a target, make sure it is the right RP.
            if [ -z "$target" ] || [ "$ip" = "$target" ] || [ "$pid" = "$target" ]; then
              break
            fi
            echo "↩️  Leased $pid/$ip but target is $target — releasing it and waiting for the right RP…"
            curl -sS -o /dev/null -X DELETE -H "Authorization: Bearer $jwt" \
              "${{ inputs.api-url }}/lease/$lid" 2>/dev/null || true
          fi
          if [ "$(date +%s)" -ge "$deadline" ]; then
            echo "::error::no${target:+ matching ($target)} RP available after waiting ${{ inputs.max-wait-seconds }}s (last HTTP ${code:-none})"
            exit 1
          fi
          echo "⏳ Bench busy / no free RP (HTTP ${code:-none}) — waiting ${{ inputs.retry-interval }}s then retrying…"
          sleep ${{ inputs.retry-interval }}
        done

        echo "✅ Got a lease on $ip"
        # Dump the full lease response (ssh key redacted) so we can see every
        # field the controller returns — RP id/tags (to request the right one)
        # and any release hint (the DELETE /lease/<id> route currently 404s).
        echo "ℹ️  Lease response (ssh_key_b64 redacted):"
        printf '%s' "$body" \
          | sed 's/"ssh_key_b64": *"[^"]*"/"ssh_key_b64":"<redacted>"/' \
          | head -c 4000
        echo
        mkdir -p ~/.ssh
        jget "$body" ssh_key_b64 | base64 -d > ~/.ssh/hil-rp
        chmod 600 ~/.ssh/hil-rp
        cat >> ~/.ssh/config <<EOF
        Host hil-rp
          HostName $ip
          User hil
          IdentityFile ~/.ssh/hil-rp
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
        EOF
        chmod 600 ~/.ssh/config
        echo "ip=$ip"       >> "$GITHUB_OUTPUT"
        echo "lease-id=$lid" >> "$GITHUB_OUTPUT"
        echo "✅ RP ready: $ip — use  ssh hil-rp \"…\"  /  scp fw.elf hil-rp:/tmp/"
        echo "🖥️  Web console: https://hil.k8s.adnt.io/"
