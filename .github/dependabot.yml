version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /crispy-common-python
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3

  - package-ecosystem: pip
    directory: /crispy-upload-python
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3

  - package-ecosystem: pip
    directory: /tests/integration
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
