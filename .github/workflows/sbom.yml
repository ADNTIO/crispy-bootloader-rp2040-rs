name: SBOM -> Dependency-Track
# Generate a CycloneDX SBOM of the whole repo with cdxgen (OWASP, multi-language:
# cargo/pip/npm/… auto-detected) and publish it to the ADNT Dependency-Track on
# every push — one vulnerability-tracking version per branch/tag
# (projectVersion = ref_name).
on:
  push: {}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate + publish SBOM
    # GitHub-only: the file lives under .github/ but Forgejo (GHES) also runs
    # these workflows. This gate keeps publishing on GitHub only.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX, cdxgen)
        run: npx --yes @cyclonedx/cdxgen@latest -o bom.json

      - name: Publish to Dependency-Track
        env:
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          PROJECT_VERSION: ${{ github.ref_name }}
        run: |
          code=$(curl -sS -o resp.json -w '%{http_code}' \
            -X POST https://dtrack.k8s.adnt.io/api/v1/bom \
            -H "X-Api-Key: $DTRACK_API_KEY" \
            -F "autoCreate=true" \
            -F "projectName=$PROJECT_NAME" \
            -F "projectVersion=$PROJECT_VERSION" \
            -F "bom=@bom.json")
          echo "Dependency-Track HTTP $code — project $PROJECT_NAME@$PROJECT_VERSION"
          case "$code" in
            2*)  echo "✅ SBOM published (Components tab should populate)." ;;
            401) echo "::error::401 — DTRACK_API_KEY lacks the BOM_UPLOAD permission."; cat resp.json; exit 1 ;;
            404) echo "::error::404 project — check autoCreate=true + PROJECT_CREATION_UPLOAD on the server."; cat resp.json; exit 1 ;;
            *)   echo "::error::Dependency-Track upload failed (HTTP $code)."; cat resp.json; exit 1 ;;
          esac
