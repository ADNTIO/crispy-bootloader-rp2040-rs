name: Security Scan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/pyproject.toml'
      - '**/uv.lock'
      - '.github/workflows/security-scan.yml'
  push: {}
  schedule:
    # Weekly scan to catch newly disclosed advisories (Mondays 06:00 UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  dependency-review:
    name: 0. Dependency review (PR diff, HIGH+)
    # GitHub-only: dependency-review-action + the artifact/SARIF APIs are
    # unsupported on Forgejo (it presents as GHES).
    if: github.event_name == 'pull_request' && github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  sbom:
    name: 1. Generate SBOMs
    runs-on: ubuntu-latest
    outputs:
      sboms: ${{ steps.list.outputs.sboms }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install SBOM tools
        run: |
          cargo install cargo-cyclonedx --locked
          pip install cyclonedx-bom

      - name: Generate SBOMs
        run: make sbom SBOM_OUT=sbom

      - id: list
        name: List SBOM names
        run: |
          names=$(ls sbom/*.cdx.json | xargs -n1 basename | sed 's/\.cdx\.json$//' | jq -R . | jq -sc .)
          echo "sboms=$names" >> "$GITHUB_OUTPUT"

      - name: Upload SBOM artifacts
        # upload-artifact@v4+ uses the v2 artifact protocol, unsupported on
        # Forgejo (GHES). Only publish on GitHub; on Forgejo the SBOMs are
        # still generated above, the run just skips the upload.
        if: github.server_url == 'https://github.com'
        uses: actions/upload-artifact@v5
        with:
          name: sbom-scan
          path: sbom/*.cdx.json
          retention-days: 7

  grype:
    name: 2a. Grype (${{ matrix.sbom }})
    needs: sbom
    # Relies on artifact download + SARIF upload to code-scanning (GitHub-only).
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sbom: ${{ fromJSON(needs.sbom.outputs.sboms) }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: sbom-scan
          path: sbom

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan SBOM with grype
        run: |
          mkdir -p reports
          set +e
          grype "sbom:sbom/${{ matrix.sbom }}.cdx.json" \
            --fail-on high \
            -o sarif=reports/grype-${{ matrix.sbom }}.sarif \
            -o table | tee reports/grype-${{ matrix.sbom }}.txt
          rc=$?
          {
            echo "## Grype: ${{ matrix.sbom }}"
            echo '```'
            cat reports/grype-${{ matrix.sbom }}.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      # Grype emits empty `artifactLocation.uri` when the SBOM has no source
      # path (typical for Python SBOMs from cyclonedx-py). CodeQL rejects
      # those, so we point them at the SBOM filename.
      - name: Patch empty SARIF locations
        if: always()
        run: |
          f=reports/grype-${{ matrix.sbom }}.sarif
          [ -f "$f" ] || exit 0
          jq --arg uri "${{ matrix.sbom }}.cdx.json" \
            '(.. | objects | select(has("artifactLocation")).artifactLocation.uri) |=
             (if (. // "") == "" then $uri else . end)' "$f" > "$f.tmp"
          mv "$f.tmp" "$f"

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/grype-${{ matrix.sbom }}.sarif
          category: grype-${{ matrix.sbom }}

      - name: Upload Grype report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: grype-reports-${{ matrix.sbom }}
          path: reports/

  trivy:
    name: 2b. Trivy (${{ matrix.sbom }})
    needs: sbom
    # Relies on artifact download + SARIF upload to code-scanning (GitHub-only).
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sbom: ${{ fromJSON(needs.sbom.outputs.sboms) }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: sbom-scan
          path: sbom

      - name: Install trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan SBOM with trivy
        run: |
          mkdir -p reports
          set +e
          trivy sbom "sbom/${{ matrix.sbom }}.cdx.json" \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output reports/trivy-${{ matrix.sbom }}.sarif
          rc=$?
          trivy sbom "sbom/${{ matrix.sbom }}.cdx.json" \
            --severity HIGH,CRITICAL \
            --format table \
            --output reports/trivy-${{ matrix.sbom }}.txt > /dev/null 2>&1
          {
            echo "## Trivy: ${{ matrix.sbom }}"
            echo '```'
            cat reports/trivy-${{ matrix.sbom }}.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/trivy-${{ matrix.sbom }}.sarif
          category: trivy-${{ matrix.sbom }}

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-reports-${{ matrix.sbom }}
          path: reports/

  # Step 3+4: risk evaluation = HIGH threshold above already gates the PR.
  # On scheduled/main runs, also open a tracking issue so vulnerabilities
  # don't go unnoticed when there's no PR to fail.
  notify:
    name: 3. Open issue on failure
    needs: [grype, trivy]
    if: |
      failure() &&
      github.server_url == 'https://github.com' &&
      (github.event_name == 'schedule' || github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: '*-reports-*'
          merge-multiple: true
          path: reports

      - name: Create or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let details = '';
            try {
              for (const f of fs.readdirSync('reports').sort()) {
                if (!f.endsWith('.txt')) continue;
                const content = fs.readFileSync(path.join('reports', f), 'utf8');
                if (content.trim()) {
                  details += `\n### ${f}\n\n\`\`\`\n${content.slice(0, 4000)}\n\`\`\`\n`;
                }
              }
            } catch (e) {
              details = '\n_Could not read scan reports — see workflow artifacts._\n';
            }

            const trigger = context.eventName === 'schedule'
              ? 'Weekly scheduled scan'
              : `Push to ${context.ref}`;

            const body = [
              `**${trigger}** detected vulnerabilities at HIGH or CRITICAL severity.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: \`${context.sha.slice(0, 7)}\``,
              `- Date: ${date}`,
              ``,
              `Review findings in the [Security tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning) (Grype + Trivy SARIF uploaded).`,
              details,
            ].join('\n');

            // Look for an existing open issue to update instead of spamming.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Security: vulnerabilities detected (${date})`,
                body,
                labels: ['security', 'automated'],
              });
            }
